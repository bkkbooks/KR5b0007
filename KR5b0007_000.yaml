body:
  text: 太上洞玄靈寶三元無量壽經人七爾時太上道君於三元宫中大會說法衆內有一真人名曰儀可則智力無畏從座而起雅步前跪咨論請訣不審一切諎法從何而生既得生巳云何觀行而得成道作是語巳儼然而立太上道君撫几微笑曰夫三界諸法皆從道生若欲求道當修觀慧觀慧增益漸至常道常道無邊行亦非一子欲知之當一心聼有數十事不可稱量何謂為數十事一者智慧逺身行法不可稱量二者慈悲逺身行法不可稱量三者舍忍逺身行法不可稱量四者行功逺身行法不可稱量五者修心逺身行法不可稱量六者善業逺身行法不可稱量七者精進逺身行法不可稱量八者飾身達身行法不可稱量九者遣情逺身行法不可稱量十者魯心逺身行法不可稱量是為十種逺身行法太上曰復有十種離口過法不可稱量何等為十種離口過法一者智慧離口過法不可稱量二者慈悲離口過法不可稱量三者舍忍離口過法不可稱量四者行功離口過法不可稱量五者修心離口過法不可稱量六者善業離口過法不可稱量七者精進離口過法不可稱量八者飾身離口過法不可稱量九者遣情離口過法不可稱量十者普心離口過法不可稱量是為十種離口過法太上曰復有十種除惡想法不可稱量何等為十種除惡想法一者智慧除惡想法不可稱量二者慈悲除惡想法不可稱量三者含忍除惡想法不可稱量四者行功除惡想法不可稱量五者修心除惡想法不可稱量六者善業除惡想法不可稱量七者精進除惡想法不可稱量八者飾身除惡想法不可稱量九者遣情除惡想法不可稱量十者普心除惡想法不可稱量是為十種除惡想法太上曰復有十種拔逮根法不可稱量何等為十種拔逮根法一者智慧拔逮根法不可稱量二者慈悲拔逮根法不可稱量三者舍忍拔逮根法不可稱量四者行功拔遠根法不可稱量五者修心拔逮根法不可稱量六者善業拔逮根法不可稱量七者精進拔逮根法不可稱量八者飾身拔逮根法不可稱量九者遣情拔逮根法不可稱量十者普心拔逺根法不可稱量是為十種拔逮根法太上曰復有十種絶聲色法不可稱量何等為十種絶聲色法一者智慧絶聲色法不可稱量二者慈悲絶聲色法不可稱量三者舍忍絶聲色法不可稱量四者行功絶聲色法不可稱量五者修心絶聲色法不可稱量六者善業絶聲色法不可稱量七者精進絶聲色法不可稱量八者飾身絶聲色法不可稱量九者遣情絶聲色法不可稱量十者普心絶聲色法不可稱量是為十種絶聲色法太上曰復有十種儉愛欲法不可稱量何等為十種儉愛欲法一者智慧儉愛欲法不可稱量二者慈悲儉愛欲法不可稱量三者舍忍儉愛欲法不可稱量四者行功儉愛欲法不可稱量五者修心儉愛欲法不可稱量六者善業儉愛欲法不可稱量七者精進儉愛欲法不可稱量八者飾身儉愛欲法不可稱量九者遣情儉愛欲法不可稱量十者普心儉愛欲法不可稱量是為十種儉愛欲法太上曰復有十種放玩習法不可稱量何等為十種放玩習法一者智慧放玩習法不可稱量二者慈悲放玩習法不可稱量三者含忍放玩習法不可稱量四者行功放玩習法不可稱量五者修心放玩習法不可稱量六者善業放玩習法不可稱量七者精進放玩習法不可稱量八者飾身放玩習法不可稱量九者遣情放玩習法不可稱量十者普心放玩習法不可稱量是謂十種放玩習法太上曰復有十種洗垢穢法不可稱量何等為十種洗垢穢法一者智慧洗垢穢法不可稱量二者慈悲洗垢穢法不可稱量三者舍忍洗垢穢法不可稱量四者行功洗垢穢法不可稱量五者修心洗垢穢法不可稱量六者善業洗垢穢法不可稱量七者精進洗垢穢法不可稱量八者飾身洗垢穢法不可稱量九者遣情洗垢穢法不可稱量十者普心洗垢穢法不可稱量是謂十種洗垢穢法太上曰復有十種無昏惑法不可稱量何等為十種無昏惑法一者智慧無昏惑法不可稱量二者慈悲無昏惑法不可稱量三者含忍無昏惑法不可稱量四者行功無昏惑法不可稱量五者修心無昏惑法不可稱量六者善業無昏惑法不可稱量七者精進無昏惑法不可稱量八者飾身無昏惑法不可稱量九者遣情無昏惑法不可稱量十者普心無昏惑法不可稱量是謂十種無昏惑法太上曰復有十種不淫想法不可稱量何等為十種不淫想法一者智慧不淫想法不可稱量二者慈悲不淫想法不可稱量三者舍忍不淫想法不可稱量四者行功不淫想法不可稱量五者修心不淫想法不可稱量六者善業不淫想法不可稱量七者精進不淫想法不可稱量八者飾身不淫想法不可稱量九者遣情不淫想法不可稱量十者普心不淫想法不可稱量是謂十種不淫想法太上曰復有十種不疑空法不可稱量何等為十種不疑空法一者智慧不疑空法不可稱量二者慈悲不疑空法不可稱量三者舍忍不疑空法不可稱量四者行功不疑空法不可稱量五者修心不疑空法不可稱量六者善業不疑空法不可稱量七者精進不疑空法不可稱量八者飾身不疑空法不可稱量九者遣情不疑空法不可稱量十者普心不疑空法不可稱量是謂十種不疑空法太上曰復有十種平好醜法不可稱量何等為十種平好醜法一者智慧平好醜法不可稱量二者慈悲平好醜法不可稱量三者舍忍平好醜法不可稱量四者行功平好醜法不可稱量五者修心平好醜法不可稱量六者善業平好醜法不可稱量七者精進平好醜法不可稱量八者飾身平好醜法不可稱量九者遣情平好醜法不可稱量十者普心平好醜法不可稱量是謂十種平好醜法太上曰復有十種不邪還法不可稱量何等為十種不邪還法一者智慧不邪還法不可稱量二者慈悲不邪還法不可稱量三者舍忍不邪還法不可稱量四者行功不邪還法不可稱量五者修心不邪還法不可稱量六者善業不邪還法不可稱量七者精進不邪還法不可稱量八者飾身不邪還法不可稱量九者遣情不邪還法不可稱量十者普心不邪還法不可稱量是謂十種不邪還法太上曰復有十種常住無法不可稱量何等為十種常住無法一者智慧常住無法不可稱量二者慈悲常住無法不可稱量三者含忍常住無法不可稱量四者行功常住無法不可稱量五者修心常住無法不可稱量六者善業常住無法不可稱量七者精進常住無法不可稱量八者飾身常住無法不可稱量九者遣情常住無法不可稱量十者普心常住無法不可稱量是謂十種常住無法太上曰復有十種絶心想法不可稱量何等為十種絶心想法一者智慧絶心想法不可稱量二者慈悲絶心想法不可稱量三者含忍絶心想法不可稱量四者行功絶心想法不可稱量五者修心絶心想法不可稱量六者善業絶心想法不可稱量七者精進絶心想法不可稱量八者飾身絶心想法不可稱量九者遣情絶心想法不可稱量十者普心絶心想法不可稱量是謂十種絶心想法太上曰復有十種習悉意法不可稱量何等為十種習悉意法一者智慧習悉意法不可稱量二者慈悲習悉意法不可稱量三者舍忍習悉意法不可稱量四者行功習悉意法不可稱量五者修心習悉意法不可稱量六者善業習悉意法不可稱量七者稱進習悉意法不可稱量八者飾身習悉意法不可稱量九者遣情習悉意法不可稱量十者普心習悉意法不可稱量是謂十種習悉意法太上曰復有十種善防言法不可稱量何等為十種善防言法一者智慧善防言法不可稱量二者慈悲善防言法不可稱量三者舍忍善防言法下可稱量四者行功善防言法不可稱量五者修心善防言法不可稱量六者善彚善防言法不可稱量七者精進善防言法不可稱量八者飾身善防言法不可稱量九者遣情善防言法不可稱量十者普心善防言法不可稱量是謂十種善防言法太上曰復有十種不亂轉法不可稱量何等為十種不亂轉法一者智慧不亂轉法下可稱量二者慈悲不亂轉法下可稱量三者含忍不亂轉法不可稱量四者行功不亂轉法不可稱量五者修心下亂轉法不可稱量六者善業下亂轉法不可稱量七者精進不亂轉法不可稱量八者飾身不亂轉法不可稱量九者遣情不亂轉法不可稱量十者者心不亂轉法不可稱量是謂十種不亂轉法太上曰復有十種下悟念法下可稱量何等為十種不悟念法一者智慈不悟念法不可稱量二者慈悲不悟念法不可稱量三者含忍不悟念法不可稱量四者行功不悟念法不可稱量五者修心不悟念法不可稱量六者善業不悟念法不可稱量七者精進不悟念法不可稱量八者飾身不悟念法不可稱量九者遣情不悟念法下可稱量十者普心不悟念法下可稱量是謂十種不悟念法太上曰復有十種不彼念法不可稱量何等為十種不彼念法一者智慧不彼念法不可稱量二者慈悲不彼念法不可稱量三者舍忍不彼念法不可稱量四者行功不彼念法不可稱量五者修心不彼念法不可稱量六者善業不彼念法不可稱量七者精進不彼念法不可稱量八者飾身不彼念法不可稱量九者遣情不彼念法不可稱量十者普心不彼念法不可稱量是謂十種不彼念法太上曰復有十種不悠想法不可稱量何等為十種不悠想法一者智慧不悠想法不可稱量二者慈悲不悠想法不可稱量三者舍忍不悠想法不可稱量四者行功不悠想法不可稱量五者修心不悠想法不可稱量六者善業不悠想法不可稱量七者精進不悠想法不可稱量八者飾身不悠想法不可稱量九者遣情不悠想法不可稱量十者著心不悠想法不可稱量是謂十種不悠想法太上曰復有十種無常定法不可稱量何等為十種無常定法一者智慧無常定法不可稱是二者慈悲無常定法不可稱量三者舍忍無常定法不可稱量四者行功無常定法不可稱量五者修心無常定法不可稱量六者善業無常定法不可稱量七者精進無常定法不可稱量八者飾身無常定法不可稱量九者遣情無常定法不可稱量十者普心無常定法不可稱量是謂十種無常定法太上曰復有十種無常的法不可稱量何等為十種無常的法一者智慧無常的法不可稱量二者慈悲無常的法不可稱量三者舍忍無常的法不可稱量四者行功無常的法不可稱量五者修心無常的法不可稱量六者善業無常的法不可稱量七者精進無常的法不可稱量八者飾身無常的法不可稱量九者遣情無常的法不可稱量十者普心無常的法不可稱量是謂十種無常的法太上曰復有十種無常顧法不可稱量何等為十種無常顧法一者智慧無常顧法不可稱量二者慈悲無常顧法不可稱量三者舍忍無常顧法不可稱量四者行功無常顧法不可稱量五者修心無常顧法不可稱量六者善業無常顧法不可稱量七者精進無常顧法不可稱量八者飾身無常顧法不可稱量九者遣情無常顧法不可稱量十者普心無常顧法不可稱量是謂十種無常顧法太上曰復有十種不追懷法不可稱量何等為十種不追懷法一者智慧不追懷法不可稱量二者慈悲不追懷法不可稱量三者含忍不追懷法不可稱量四者行功不追懷法不可稱量五者修心不追懷法不可稱量六者善業不追懷法不可稱量七者精進不追懷法不可稱量八者飾身不追懷法不可稱量九者遣情不追懷法不可稱量十者普心不追懷法不可稱量是謂十種不追懷法太上曰復有十種無猶豫法不可稱量何等為十種無猶豫法一者智慧無猶豫法不可稱量二者慈悲無猶豫法不可稱量三者含忍無猶豫法不可稱量四者行功無猶豫法不可稱量五者修心無猶豫法不可稱量六者善業無猶豫法不可稱量七者精進無猶豫法不可稱量八者飾身無猶豫法不可稱量九者遣情無猶豫法不可稱量十者普心無猶豫法不可稱量是謂十種無猶豫法太上曰復有十種忍不可忍法不可稱量何等為十種忍不可忍法一者智慧忍不可忍法不可稱量二者慈悲忍不可忍法不可稱量三者舍忍忍不可忍法不可稱量四者行功忍不可忍法不可稱量五者修心忍不可忍法不可稱量六者善業忍不可忍法不可稱量七者精進忍不可忍法不可稱量八者飾身忍不可忍法不可稱量九者遣情忍不可忍法不可稱量十者普心忍不可忍法不可稱量是謂十種忍不可忍法道言夫洞玄經者蓋天地之源道德之宗上聖所尊貴鬼神所畏伏其髙則出九天之上其深則通九地之下千變萬化道盡於此若復有人能於此經受持讀誦心無懈怠即得生無量智慧增無量善因滅無量業障消無量煩惱延無量壽算長無量福田世世歡榮生生快樂恆須恭敬抄寫流傳利益衆生是為無量真人聞說信受奉行太上洞玄靈寶三元無量壽經
